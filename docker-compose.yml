version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_tracker
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/job_tracker
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-notifications@jobtracker.com}
    ports:
      - "5001:5000"
    command: >
      sh -c "python -c 'from app import app, db; app.app_context().push(); db.create_all()' &&
             gunicorn --bind 0.0.0.0:5000 --workers 2 app:app"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5001/api
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5001/api
    ports:
      - "3000:80"

volumes:
  db_data:
